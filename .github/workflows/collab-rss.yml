name: Collab RSS Auto-Update

on:
  schedule:
    # 毎日午前9時（JST）に実行
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  fetch-collab-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch collab RSS feeds
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');

          // RSSフィード一覧（スニーカー・ストリート系ニュース）
          const feeds = [
            'https://sneakernews.com/feed/',
            'https://www.highsnobiety.com/feed/',
            'https://hypebeast.com/feed',
          ];

          const results = [];

          function fetchFeed(url) {
            return new Promise((resolve) => {
              https.get(url, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  // タイトルとリンクを抽出
                  const items = [...data.matchAll(/<item>[\s\S]*?<\/item>/g)];
                  const parsed = items.slice(0, 5).map(match => {
                    const title = (match[0].match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/) ||
                                   match[0].match(/<title>(.*?)<\/title>/))?.[1] || '';
                    const link  = (match[0].match(/<link>(.*?)<\/link>/))?.[1] || '';
                    const date  = (match[0].match(/<pubDate>(.*?)<\/pubDate>/))?.[1] || '';
                    return { title: title.trim(), link: link.trim(), date: date.trim(), source: url };
                  }).filter(i => i.title && i.link);
                  resolve(parsed);
                });
              }).on('error', () => resolve([]));
            });
          }

          Promise.all(feeds.map(fetchFeed)).then(allItems => {
            const flat = allItems.flat();
            // コラボ関連キーワードでフィルタ
            const keywords = ['collab', 'collaboration', 'nike', 'supreme', 'off-white', 'travis', 'jordan', 'adidas', 'new balance', 'コラボ'];
            const filtered = flat.filter(item =>
              keywords.some(kw => item.title.toLowerCase().includes(kw))
            );
            const output = {
              updatedAt: new Date().toISOString(),
              items: filtered.slice(0, 20)
            };
            fs.writeFileSync('lib/collab-rss.json', JSON.stringify(output, null, 2));
            console.log('Fetched', filtered.length, 'collab items');
          });
          "

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet lib/collab-rss.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/collab-rss.json
          git commit -m "chore: auto-update collab RSS feed [skip ci]"
          git push
